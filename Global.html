<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Travel Diary | 旅行足跡</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- 引入 Panzoom 實現地圖拖曳與縮放 -->
  <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom/dist/panzoom.min.js"></script>

  <style>
    /* 隱藏滾動條但保留滾動功能 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 溫暖的字體與背景設定 */
    body {
      background-color: #fdfbf7;
      color: #374151;
      font-family: 'Nunito', ui-rounded, 'Hiragino Maru Gothic ProN', 'Quicksand', sans-serif;
    }

    /* 圖釘反向縮放邏輯 (隨地圖放大而相對變小以增加精度) */
    .pin-wrapper {
      /* 預設比例為 1，當 Panzoom 縮放時由 JS 動態更新 --pin-scale */
      transform: scale(var(--pin-scale, 1));
      transition: transform 0.1s ease-out;
    }
    .pin-wrapper.is-active {
      transform: scale(calc(var(--pin-scale, 1) * 1.3));
    }
    .pin-wrapper:not(.is-active):hover {
      transform: scale(calc(var(--pin-scale, 1) * 1.15));
    }
  </style>
</head>
<body class="selection:bg-pink-200 relative overflow-x-hidden">

  <!-- 環境背景可愛光暈 -->
  <div class="fixed top-[-10%] left-[-10%] w-[60%] h-[60%] rounded-full bg-pink-200/40 blur-[100px] pointer-events-none -z-10"></div>
  <div class="fixed bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-sky-200/40 blur-[100px] pointer-events-none -z-10"></div>
  <div class="fixed top-[40%] left-[30%] w-[40%] h-[40%] rounded-full bg-yellow-100/40 blur-[100px] pointer-events-none -z-10"></div>

  <!-- 導航列 -->
  <header class="px-6 py-4 sticky top-0 z-50 flex items-center justify-between bg-white/80 backdrop-blur-md border-b border-gray-100 shadow-sm">
    <div class="flex items-center gap-3">
      <div class="p-2 bg-pink-100 rounded-xl text-pink-500 shadow-sm">
        <i data-lucide="plane" class="w-6 h-6 animate-[bounce_3s_infinite]"></i>
      </div>
      <div>
        <h1 class="text-xl font-bold tracking-wide text-gray-800">
          Travel Diary
        </h1>
        <p class="text-[11px] text-gray-500 tracking-wider font-medium">記錄每個美好的角落 ✨</p>
      </div>
    </div>
    <div class="hidden md:flex items-center gap-2 px-4 py-2 bg-white rounded-full shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
      <i data-lucide="sun" class="w-4 h-4 text-yellow-400"></i>
      <span class="text-xs font-bold text-gray-600 tracking-wider">LET'S GO EXPLORING!</span>
    </div>
  </header>

  <!-- 主要內容區 -->
  <main class="max-w-[1400px] mx-auto px-4 md:px-6 py-8 md:py-10 flex flex-col xl:flex-row gap-8 items-start">
    
    <!-- 左側：世界地圖 (已加入拖曳縮放功能) -->
    <div class="w-full xl:w-2/3 flex flex-col gap-4">
      <div class="flex items-center justify-between px-2">
        <h2 class="text-xl font-bold flex items-center gap-2 text-gray-800">
          <i data-lucide="map" class="w-6 h-6 text-sky-500"></i>
          旅行足跡 <span class="text-gray-400 text-sm font-medium ml-1">| My Journey</span>
        </h2>
        <span class="text-xs text-gray-400 font-medium bg-white px-3 py-1 rounded-full shadow-sm border border-gray-100 flex items-center gap-1">
          <i data-lucide="move" class="w-3 h-3"></i> 支援拖曳與縮放
        </span>
      </div>
      
      <!-- 地圖容器 -->
      <div class="w-full relative bg-[#e0f2fe] rounded-[2rem] md:rounded-[2.5rem] overflow-hidden border-4 border-white shadow-lg h-[45vh] min-h-[350px] md:h-[500px]">
          
          <!-- 右下角縮放控制面板 -->
          <div class="absolute bottom-4 right-4 flex flex-col gap-2 z-30">
            <button id="zoom-in" class="p-2.5 bg-white/90 backdrop-blur-sm rounded-xl shadow text-gray-700 hover:bg-white hover:scale-110 hover:text-sky-500 transition-all active:scale-95 border border-gray-100" aria-label="放大">
              <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
            <button id="zoom-out" class="p-2.5 bg-white/90 backdrop-blur-sm rounded-xl shadow text-gray-700 hover:bg-white hover:scale-110 hover:text-sky-500 transition-all active:scale-95 border border-gray-100" aria-label="縮小">
              <i data-lucide="minus" class="w-5 h-5"></i>
            </button>
            <button id="zoom-reset" class="p-2.5 bg-white/90 backdrop-blur-sm rounded-xl shadow text-gray-700 hover:bg-white hover:scale-110 hover:text-sky-500 transition-all active:scale-95 border border-gray-100" aria-label="還原">
              <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
          </div>

          <!-- Panzoom 互動層 -->
          <div class="w-full h-full flex items-center justify-center overflow-hidden">
            <!-- 嚴格綁定圖片真實比例，確保定位完美無偏差 -->
            <div id="panzoom-element" class="relative w-[180%] md:w-full flex-shrink-0 cursor-grab active:cursor-grabbing origin-center" style="aspect-ratio: 2754/1398;">
                <img 
                  src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg"
                  alt="World Map"
                  class="absolute inset-0 w-full h-full object-cover opacity-[0.25] pointer-events-none select-none"
                  draggable="false"
                  onerror="this.style.display='none';"
                />
                <!-- 地圖標記點 (Pins) -->
                <div id="map-pins-container" class="absolute inset-0"></div>
            </div>
          </div>
      </div>
    </div>

    <!-- 右側：詳細資訊 -->
    <div class="w-full xl:w-1/3 flex flex-col gap-4">
      <div class="flex items-center justify-between px-2">
        <h2 class="text-xl font-bold flex items-center gap-2 text-gray-800">
          <i data-lucide="book-open" class="w-6 h-6 text-pink-400"></i>
          旅程小手札 <span class="text-gray-400 text-sm font-medium ml-1">| Trip Diary</span>
        </h2>
      </div>

      <div id="briefing-panel" class="relative rounded-[2rem] bg-white shadow-xl border border-gray-100 p-6 md:p-8 overflow-hidden flex flex-col min-h-[400px]">
        <!-- 內容渲染區 -->
      </div>
    </div>
  </main>

  <!-- 底部：所有旅程清單 -->
  <section class="max-w-[1400px] mx-auto px-4 md:px-6 pb-16 pt-8 mt-4">
    <div class="flex items-center gap-2 mb-6 px-2">
      <i data-lucide="camera" class="w-6 h-6 text-indigo-400"></i>
      <h2 class="text-2xl font-bold text-gray-800">所有的美好回憶 <span class="text-gray-400 font-medium text-base ml-2">| All Adventures</span></h2>
    </div>
    
    <div id="archives-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    </div>
  </section>
  
  <footer class="text-center py-8 text-gray-400 text-sm font-medium bg-white/50 border-t border-gray-100 backdrop-blur-sm">
    © 2026 Travel Diary. Keep exploring the world. 🌍
  </footer>

  <!-- 應用程式邏輯 -->
  <script>
    // 經緯度精確校正！基於真實 Google Map 座標與等距圓柱投影公式轉換
    const JOURNEYS = [
      { id: 1, title: "北歐極地遠征", subtitle: "Nordic Expedition 2025-26", loc: "北歐・跨國", desc: "準備好雪地裝備，探索芬蘭、挪威等地的冰雪奇緣與極光秘境。⛄", url: "https://derekqaq.github.io/TourbookNorth/Tourbook", top: "12.2%", left: "56.6%", icon: "snowflake", theme: { bg: "bg-blue-100", text: "text-blue-600", gradient: "from-blue-400 to-sky-400", shadow: "shadow-blue-200" }, tags: ["#極地遠征", "#追極光", "#夢幻雪國"], stats: { days: "14+ 天", type: "極地自駕", highlight: "極光秘境" } },
      { id: 2, title: "奧捷匈童話之旅", subtitle: "A-C-H Winter Tour", loc: "中歐・奧捷匈", desc: "12天10夜的冬季雪國雙城深度自駕，漫步百年聖誕市集與浪漫的跨年煙火。🎄", url: "https://derekqaq.github.io/TourbookNorth/A-C-H", top: "23.2%", left: "54.5%", icon: "castle", theme: { bg: "bg-orange-100", text: "text-orange-600", gradient: "from-orange-400 to-amber-400", shadow: "shadow-orange-200" }, tags: ["#冬季童話", "#聖誕市集", "#浪漫跨年"], stats: { days: "12 天", type: "跨國自駕", highlight: "聖誕市集" } },
      { id: 3, title: "北海道自駕之旅", subtitle: "Hokkaido Summer", loc: "日本・北海道", desc: "夏日追花與積丹藍的7天6夜自駕攻略，輕鬆掌握道央至道南的完美路線。🌻", url: "https://derekqaq.github.io/TourbookNorth/Hokkaido", top: "26.1%", left: "89.2%", icon: "flower-2", theme: { bg: "bg-emerald-100", text: "text-emerald-600", gradient: "from-emerald-400 to-teal-400", shadow: "shadow-emerald-200" }, tags: ["#夏日追花", "#積丹藍", "#美味海鮮"], stats: { days: "7 天", type: "輕鬆自駕", highlight: "富良野花海" } },
      { id: 4, title: "鳥取公路之旅", subtitle: "Tottori Coastal Drive", loc: "日本・山陰海岸", desc: "4天3夜松葉蟹、海景溫泉與鳥取砂丘的療癒之旅，盡享山陰海岸風光。🦀", url: "https://derekqaq.github.io/TourbookNorth/Birdtake", top: "30.2%", left: "87.2%", icon: "waves", theme: { bg: "bg-cyan-100", text: "text-cyan-600", gradient: "from-cyan-400 to-blue-400", shadow: "shadow-cyan-200" }, tags: ["#海景溫泉", "#松葉蟹", "#鳥取砂丘"], stats: { days: "4 天", type: "海岸公路", highlight: "溫泉放鬆" } },
      { id: 5, title: "美西公路壯遊", subtitle: "PHX to LAS Adventure", loc: "美國・西南部", desc: "從鳳凰城到拉斯維加斯的壯麗公路旅行，穿越無垠峽谷與不夜城的極致體驗。🏜️", url: "https://derekqaq.github.io/TourbookNorth/PHX-LV", top: "29.9%", left: "18.0%", icon: "mountain", theme: { bg: "bg-rose-100", text: "text-rose-600", gradient: "from-rose-400 to-pink-500", shadow: "shadow-rose-200" }, tags: ["#大峽谷", "#公路旅行", "#不夜城"], stats: { days: "10+ 天", type: "沙漠公路", highlight: "壯麗峽谷" } },
      { id: 6, title: "西澳秘境之旅", subtitle: "Perth Discovery", loc: "澳洲・伯斯", desc: "探索西澳伯斯的自然生態與壯闊海岸線，感受南半球的無盡陽光與可愛短尾矮袋鼠！🦘", url: "https://derekqaq.github.io/TourbookNorth/Perth", top: "67.7%", left: "82.1%", icon: "sun", theme: { bg: "bg-yellow-100", text: "text-yellow-600", gradient: "from-yellow-400 to-amber-500", shadow: "shadow-yellow-200" }, tags: ["#自然生態", "#無盡陽光", "#短尾矮袋鼠"], stats: { days: "8+ 天", type: "自然探索", highlight: "野生動物" } },
      { id: 7, title: "東澳陽光海岸", subtitle: "East AUS Adventure", loc: "澳洲・東海岸", desc: "雪梨歌劇院的經典、大堡礁的湛藍，以及黃金海岸的陽光沙灘，展開一場南半球的東澳經典之旅。🐨", url: "https://derekqaq.github.io/TourbookNorth/East-AUS.html", top: "67.0%", left: "92.0%", icon: "sunset", theme: { bg: "bg-purple-100", text: "text-purple-600", gradient: "from-purple-400 to-fuchsia-400", shadow: "shadow-purple-200" }, tags: ["#雪梨歌劇院", "#大堡礁", "#黃金海岸"], stats: { days: "10+ 天", type: "海岸探索", highlight: "陽光沙灘" } }
    ];

    let activeJourney = JOURNEYS[0];
    let mapScale = 1; // 記錄當前的地圖縮放比例

    // 切換行程
    function setActive(id, scrollToTop = false) {
      activeJourney = JOURNEYS.find(j => j.id === id);
      render();
      if (scrollToTop) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    // 渲染函數
    function render() {
      // 1. 繪製地圖標記 (中心點對齊 left/top，並套用反向縮放動畫 wrapper)
      const pinsHtml = JOURNEYS.map(j => {
        const isActive = activeJourney.id === j.id;
        return `
          <div class="absolute flex items-center justify-center z-20 ${isActive ? 'z-30' : ''}" 
               style="left: ${j.left}; top: ${j.top}; width: 0; height: 0;">
            <button 
              class="pin-wrapper ${isActive ? 'is-active' : ''} absolute flex items-center justify-center group" 
              onclick="setActive(${j.id})"
              onpointerdown="event.stopPropagation()" 
            >
              <!-- 標籤 Tooltip (Hover時顯示) -->
              <div class="absolute bottom-full mb-2 whitespace-nowrap bg-gray-800 text-white text-[11px] px-2.5 py-1 rounded-md opacity-0 transition-opacity duration-200 pointer-events-none shadow-md group-hover:opacity-100">
                ${j.title}
              </div>
              
              <!-- 圖釘本體 (微調預設尺寸為 w-5 h-5 讓點位更精緻) -->
              <div class="w-5 h-5 rounded-full border-[3px] border-white shadow-md bg-gradient-to-br ${j.theme.gradient} flex items-center justify-center ${isActive ? 'animate-bounce shadow-lg ring-4 ring-sky-200/50' : ''}"></div>
            </button>
          </div>
        `;
      }).join('');
      document.getElementById('map-pins-container').innerHTML = pinsHtml;

      // 2. 繪製右側簡報面板
      const active = activeJourney;
      document.getElementById('briefing-panel').innerHTML = `
        <div class="flex items-start gap-5 mb-6 relative z-10">
          <div class="p-4 rounded-[1.5rem] bg-gradient-to-br ${active.theme.gradient} text-white shadow-lg shrink-0">
            <i data-lucide="${active.icon}" class="w-8 h-8"></i>
          </div>
          <div>
            <h3 class="text-xs font-extrabold ${active.theme.text} tracking-widest mb-1">${active.loc}</h3>
            <h2 class="text-2xl font-bold text-gray-800 leading-tight">${active.title}</h2>
          </div>
        </div>
        <p class="text-gray-600 mb-8 flex-grow font-medium leading-relaxed">${active.desc}</p>
        <div class="grid grid-cols-2 gap-4 mb-8">
          <div class="bg-gray-50 rounded-2xl p-4 border border-gray-100">
            <span class="block text-[10px] text-gray-400 tracking-wider mb-1">日期長度</span>
            <span class="font-bold text-gray-700">${active.stats.days}</span>
          </div>
          <div class="bg-gray-50 rounded-2xl p-4 border border-gray-100">
            <span class="block text-[10px] text-gray-400 tracking-wider mb-1">旅程類型</span>
            <span class="font-bold text-gray-700">${active.stats.type}</span>
          </div>
        </div>
        <a href="${active.url}" target="_blank" class="w-full text-center py-4 rounded-2xl font-bold text-white bg-gradient-to-r ${active.theme.gradient} hover:shadow-lg hover:-translate-y-1 transition-all shadow-md">
          出發去看看 ✨
        </a>
      `;

      // 3. 繪製底部卡片列表
      const archivesHtml = JOURNEYS.map(j => `
        <button onclick="setActive(${j.id}, true)" class="text-left p-6 rounded-[2rem] bg-white border-2 transition-all group ${activeJourney.id === j.id ? 'border-sky-300 shadow-md ring-4 ring-sky-50' : 'border-gray-100 hover:border-gray-200 hover:-translate-y-2 hover:shadow-md'}">
          <div class="flex items-center gap-3 mb-3">
             <div class="p-2 rounded-xl bg-gradient-to-br ${j.theme.gradient} text-white shadow-sm group-hover:scale-110 transition-transform">
               <i data-lucide="${j.icon}" class="w-4 h-4"></i>
             </div>
             <span class="text-[10px] font-bold text-gray-400 tracking-wider">${j.loc}</span>
          </div>
          <h3 class="text-xl font-bold text-gray-800 mb-1">${j.title}</h3>
          <p class="text-sm text-gray-500 line-clamp-1">${j.subtitle}</p>
        </button>
      `).join('');
      document.getElementById('archives-container').innerHTML = archivesHtml;
      
      // 重新生成 Lucide Icons
      lucide.createIcons();
    }

    // 初始化與設定
    window.onload = () => {
      // 預設縮放變數初始化
      document.documentElement.style.setProperty('--pin-scale', 1);
      render();

      // 初始化地圖縮放套件 (Panzoom)
      const elem = document.getElementById('panzoom-element');
      const panzoom = Panzoom(elem, {
        maxScale: 6,
        minScale: 1,
        step: 0.3,
        contain: 'outside', // 避免拖拉出視窗外
        cursor: 'grab'
      });

      // 監聽縮放事件，實現「放大地圖時圖釘相對縮小」的視覺效果
      elem.addEventListener('panzoomzoom', (event) => {
        const currentScale = event.detail.scale;
        // 透過 CSS 變數將圖釘套用反向縮放，例如地圖放大 3 倍，圖釘就縮小至 1/3，以維持原始像素大小，不遮擋地圖細節
        document.documentElement.style.setProperty('--pin-scale', 1 / currentScale);
      });

      // 電腦版滾輪縮放支援
      const parent = elem.parentElement;
      parent.addEventListener('wheel', function(e) {
        e.preventDefault(); // 防止滾輪滾動網頁
        panzoom.zoomWithWheel(e);
      });

      // 綁定控制按鈕
      document.getElementById('zoom-in').addEventListener('click', panzoom.zoomIn);
      document.getElementById('zoom-out').addEventListener('click', panzoom.zoomOut);
      document.getElementById('zoom-reset').addEventListener('click', panzoom.reset);
    };
  </script>
</body>
</html>
