<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Travel Diary | 旅行足跡</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- 引入 Leaflet 地圖引擎 CSS 與 JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* 隱藏滾動條但保留滾動功能 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 溫暖的字體與背景設定 */
    body {
      background-color: #fdfbf7;
      color: #374151;
      font-family: 'Nunito', ui-rounded, 'Hiragino Maru Gothic ProN', 'Quicksand', sans-serif;
    }

    /* 覆寫 Leaflet 預設樣式以符合我們的手帳風格 */
    .leaflet-container {
      background: #e0f2fe; /* 當地圖還沒載入時的海洋底色 */
      font-family: inherit;
    }
    .leaflet-control-zoom {
      display: none; /* 隱藏預設縮放按鈕，我們自己做可愛版的 */
    }
    .leaflet-control-attribution {
      background: rgba(255, 255, 255, 0.6) !important;
      backdrop-filter: blur(4px);
      border-top-left-radius: 8px;
      color: #6b7280 !important;
    }
    .custom-div-icon {
      background: transparent;
      border: none;
    }
  </style>
</head>
<body class="selection:bg-pink-200 relative overflow-x-hidden">

  <!-- 環境背景可愛光暈 -->
  <div class="fixed top-[-10%] left-[-10%] w-[60%] h-[60%] rounded-full bg-pink-200/40 blur-[100px] pointer-events-none -z-10"></div>
  <div class="fixed bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-sky-200/40 blur-[100px] pointer-events-none -z-10"></div>
  <div class="fixed top-[40%] left-[30%] w-[40%] h-[40%] rounded-full bg-yellow-100/40 blur-[100px] pointer-events-none -z-10"></div>

  <!-- 導航列 -->
  <header class="px-4 md:px-6 py-4 sticky top-0 z-50 flex items-center justify-between bg-white/80 backdrop-blur-md border-b border-gray-100 shadow-sm">
    <div class="flex items-center gap-3">
      <div class="p-2 bg-pink-100 rounded-xl text-pink-500 shadow-sm">
        <i data-lucide="plane" class="w-5 h-5 md:w-6 md:h-6 animate-[bounce_3s_infinite]"></i>
      </div>
      <div>
        <h1 class="text-lg md:text-xl font-bold tracking-wide text-gray-800">
          Travel Diary
        </h1>
        <p class="text-[10px] md:text-[11px] text-gray-500 tracking-wider font-medium">記錄每個美好的角落 ✨</p>
      </div>
    </div>
    <div class="hidden md:flex items-center gap-2 px-4 py-2 bg-white rounded-full shadow-sm border border-gray-100 hover:shadow-md transition-shadow cursor-pointer">
      <i data-lucide="sun" class="w-4 h-4 text-yellow-400"></i>
      <span class="text-xs font-bold text-gray-600 tracking-wider">LET'S GO EXPLORING!</span>
    </div>
  </header>

  <!-- 主要內容區 -->
  <main class="max-w-[1400px] mx-auto px-4 md:px-6 py-6 md:py-10 flex flex-col xl:flex-row gap-8 items-start">
    
    <!-- 左側：世界地圖 (使用 Leaflet 引擎) -->
    <div class="w-full xl:w-2/3 flex flex-col gap-4 relative z-10">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between px-1 md:px-2 gap-2">
        <h2 class="text-lg md:text-xl font-bold flex items-center gap-2 text-gray-800">
          <i data-lucide="map" class="w-5 h-5 md:w-6 md:h-6 text-sky-500"></i>
          旅行足跡 <span class="text-gray-400 text-xs md:text-sm font-medium ml-1">| My Journey</span>
        </h2>
        <span class="text-[10px] md:text-xs text-gray-400 font-medium bg-white px-3 py-1 rounded-full shadow-sm border border-gray-100 flex items-center gap-1 w-fit">
          <i data-lucide="navigation" class="w-3 h-3 text-sky-400"></i> 支援動態飛行與縮放
        </span>
      </div>
      
      <!-- 地圖容器 -->
      <div class="w-full relative rounded-[2rem] md:rounded-[2.5rem] overflow-hidden border-4 border-white shadow-lg h-[45vh] min-h-[350px] md:h-[550px]">
          
          <!-- 右下角縮放控制面板 (與 Leaflet 綁定) -->
          <div class="absolute bottom-4 md:bottom-6 right-3 md:right-4 flex flex-col gap-2 z-[400]">
            <button id="zoom-in" class="p-2 md:p-2.5 bg-white/90 backdrop-blur-sm rounded-xl shadow text-gray-700 hover:bg-white hover:scale-110 hover:text-sky-500 transition-all active:scale-95 border border-gray-100" aria-label="放大">
              <i data-lucide="plus" class="w-4 h-4 md:w-5 md:h-5"></i>
            </button>
            <button id="zoom-out" class="p-2 md:p-2.5 bg-white/90 backdrop-blur-sm rounded-xl shadow text-gray-700 hover:bg-white hover:scale-110 hover:text-sky-500 transition-all active:scale-95 border border-gray-100" aria-label="縮小">
              <i data-lucide="minus" class="w-4 h-4 md:w-5 md:h-5"></i>
            </button>
            <button id="zoom-reset" class="p-2 md:p-2.5 bg-white/90 backdrop-blur-sm rounded-xl shadow text-gray-700 hover:bg-white hover:scale-110 hover:text-sky-500 transition-all active:scale-95 border border-gray-100" aria-label="觀看全世界">
              <i data-lucide="globe" class="w-4 h-4 md:w-5 md:h-5"></i>
            </button>
          </div>

          <!-- Leaflet 實際掛載點 -->
          <div id="map" class="w-full h-full z-0"></div>
      </div>
    </div>

    <!-- 右側：詳細資訊 -->
    <div class="w-full xl:w-1/3 flex flex-col gap-4 relative z-20">
      <div class="flex items-center justify-between px-1 md:px-2">
        <h2 class="text-lg md:text-xl font-bold flex items-center gap-2 text-gray-800">
          <i data-lucide="book-open" class="w-5 h-5 md:w-6 md:h-6 text-pink-400"></i>
          旅程小手札 <span class="text-gray-400 text-xs md:text-sm font-medium ml-1">| Trip Diary</span>
        </h2>
      </div>

      <div id="briefing-panel" class="relative rounded-[2rem] bg-white shadow-xl border border-gray-100 p-5 md:p-8 overflow-hidden flex flex-col min-h-[350px] md:min-h-[400px]">
        <!-- 內容將由 JS 動態渲染 -->
      </div>
    </div>
  </main>

  <!-- 底部：所有旅程清單 -->
  <section class="max-w-[1400px] mx-auto px-4 md:px-6 pb-12 md:pb-16 pt-4 md:pt-8 mt-2 relative z-20">
    <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-2 mb-6 px-1 md:px-2">
      <div class="flex items-center gap-2">
        <i data-lucide="camera" class="w-5 h-5 md:w-6 md:h-6 text-indigo-400"></i>
        <h2 class="text-xl md:text-2xl font-bold text-gray-800">所有的美好回憶</h2>
      </div>
      <span class="text-gray-400 font-medium text-xs md:text-base ml-0 sm:ml-2">| All Adventures</span>
    </div>
    
    <div id="archives-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-6">
    </div>
  </section>
  
  <footer class="text-center py-6 md:py-8 text-gray-400 text-xs md:text-sm font-medium bg-white/50 border-t border-gray-100 backdrop-blur-sm relative z-20">
    © 2026 Travel Diary. Keep exploring the world. 🌍
  </footer>

  <!-- 應用程式邏輯 -->
  <script>
    /* 【全新 GPS 定位系統】
      採用真實的 [緯度, 經度] (Latitude, Longitude) 坐標。
      永遠 100% 精準定位於真實的世界地圖上！
    */
    const JOURNEYS = [
      { 
        id: 1, title: "北歐極地遠征", subtitle: "Nordic Expedition 2025-26", loc: "北歐・跨國", 
        desc: "準備好雪地裝備，探索芬蘭、挪威等地的冰雪奇緣與極光秘境。⛄", 
        url: "https://derekqaq.github.io/TourbookNorth/Tourbook", 
        coords: [68.0, 23.0], /* 芬蘭/瑞典/挪威北部交界處 */
        icon: "snowflake", theme: { bg: "bg-blue-100", text: "text-blue-600", gradient: "from-blue-400 to-sky-400", shadow: "shadow-blue-200" }, 
        tags: ["#極地遠征", "#追極光", "#夢幻雪國"], stats: { days: "14+ 天", type: "極地自駕", highlight: "極光秘境" } 
      },
      { 
        id: 2, title: "奧捷匈童話之旅", subtitle: "A-C-H Winter Tour", loc: "中歐・奧捷匈", 
        desc: "12天10夜的冬季雪國雙城深度自駕，漫步百年聖誕市集與浪漫的跨年煙火。🎄", 
        url: "https://derekqaq.github.io/TourbookNorth/A-C-H", 
        coords: [48.2082, 16.3738], /* 奧地利維也納 */
        icon: "castle", theme: { bg: "bg-orange-100", text: "text-orange-600", gradient: "from-orange-400 to-amber-400", shadow: "shadow-orange-200" }, 
        tags: ["#冬季童話", "#聖誕市集", "#浪漫跨年"], stats: { days: "12 天", type: "跨國自駕", highlight: "聖誕市集" } 
      },
      { 
        id: 3, title: "北海道自駕之旅", subtitle: "Hokkaido Summer", loc: "日本・北海道", 
        desc: "夏日追花與積丹藍的7天6夜自駕攻略，輕鬆掌握道央至道南的完美路線。🌻", 
        url: "https://derekqaq.github.io/TourbookNorth/Hokkaido", 
        coords: [43.0618, 141.3545], /* 日本北海道札幌 */
        icon: "flower-2", theme: { bg: "bg-emerald-100", text: "text-emerald-600", gradient: "from-emerald-400 to-teal-400", shadow: "shadow-emerald-200" }, 
        tags: ["#夏日追花", "#積丹藍", "#美味海鮮"], stats: { days: "7 天", type: "輕鬆自駕", highlight: "富良野花海" } 
      },
      { 
        id: 4, title: "鳥取公路之旅", subtitle: "Tottori Coastal Drive", loc: "日本・山陰海岸", 
        desc: "4天3夜松葉蟹、海景溫泉與鳥取砂丘的療癒之旅，盡享山陰海岸風光。🦀", 
        url: "https://derekqaq.github.io/TourbookNorth/Birdtake", 
        coords: [35.5011, 134.2351], /* 日本鳥取市 */
        icon: "waves", theme: { bg: "bg-cyan-100", text: "text-cyan-600", gradient: "from-cyan-400 to-blue-400", shadow: "shadow-cyan-200" }, 
        tags: ["#海景溫泉", "#松葉蟹", "#鳥取砂丘"], stats: { days: "4 天", type: "海岸公路", highlight: "溫泉放鬆" } 
      },
      { 
        id: 5, title: "美西公路壯遊", subtitle: "PHX to LAS Adventure", loc: "美國・西南部", 
        desc: "從鳳凰城到拉斯維加斯的壯麗公路旅行，穿越無垠峽谷與不夜城的極致體驗。🏜️", 
        url: "https://derekqaq.github.io/TourbookNorth/PHX-LV", 
        coords: [36.1699, -114.5], /* 拉斯維加斯與大峽谷之間 */
        icon: "mountain", theme: { bg: "bg-rose-100", text: "text-rose-600", gradient: "from-rose-400 to-pink-500", shadow: "shadow-rose-200" }, 
        tags: ["#大峽谷", "#公路旅行", "#不夜城"], stats: { days: "10+ 天", type: "沙漠公路", highlight: "壯麗峽谷" } 
      },
      { 
        id: 6, title: "西澳秘境之旅", subtitle: "Perth Discovery", loc: "澳洲・伯斯", 
        desc: "探索西澳伯斯的自然生態與壯闊海岸線，感受南半球的無盡陽光與可愛短尾矮袋鼠！🦘", 
        url: "https://derekqaq.github.io/TourbookNorth/Perth", 
        coords: [-31.9505, 115.8605], /* 澳洲西澳伯斯 */
        icon: "sun", theme: { bg: "bg-yellow-100", text: "text-yellow-600", gradient: "from-yellow-400 to-amber-500", shadow: "shadow-yellow-200" }, 
        tags: ["#自然生態", "#無盡陽光", "#短尾矮袋鼠"], stats: { days: "8+ 天", type: "自然探索", highlight: "野生動物" } 
      },
      { 
        id: 7, title: "東澳雙城之旅", subtitle: "SYD & MEL Adventure", loc: "澳洲・東南部", 
        desc: "漫步於雪梨歌劇院的絕美港灣，穿梭於墨爾本的咖啡巷弄與文藝街區，展開一場南半球的經典雙城之旅。🐨", 
        url: "https://derekqaq.github.io/TourbookNorth/East-AUS.html", 
        coords: [-33.8688, 151.2093], /* 澳洲雪梨 */
        icon: "sunset", theme: { bg: "bg-purple-100", text: "text-purple-600", gradient: "from-purple-400 to-fuchsia-400", shadow: "shadow-purple-200" }, 
        tags: ["#雪梨歌劇院", "#墨爾本文青", "#南半球雙城"], stats: { days: "10+ 天", type: "雙城探索", highlight: "城市漫步" } 
      },
      { 
        id: 8, title: "埃及秘境包車行", subtitle: "Egypt Grand Tour", loc: "埃及・北非", 
        desc: "法老、神廟、撒哈拉與紅海的奇幻漂流。夜宿黑白沙漠、搭乘熱氣球與紅海渡假。🐪", 
        url: "https://derekqaq.github.io/TourbookNorth/Egypt", 
        coords: [30.0444, 31.2357], /* 埃及開羅 */
        icon: "landmark", theme: { bg: "bg-amber-100", text: "text-amber-700", gradient: "from-amber-400 to-yellow-500", shadow: "shadow-amber-200" }, 
        tags: ["#黑白沙漠", "#金字塔", "#熱氣球"], stats: { days: "15 天", type: "包車探索", highlight: "法老與神廟" } 
      }
    ];

    let activeJourney = JOURNEYS[0];
    let map; // 儲存 Leaflet 地圖實例
    let markers = []; // 儲存所有標記點

    // 建立自訂的 HTML 圖標
    function createCustomIcon(j, isActive) {
      const htmlContent = `
        <div class="group relative flex items-center justify-center transition-all duration-500 ${isActive ? 'scale-[1.3] md:scale-[1.4] z-50' : 'hover:scale-125 z-40'}">
          <!-- Hover 時顯示的標題 -->
          <div class="absolute bottom-[120%] whitespace-nowrap bg-gray-800/90 text-white text-[10px] md:text-[12px] font-bold px-2 py-1 md:px-3 md:py-1.5 rounded-lg opacity-0 transition-all duration-300 pointer-events-none shadow-md transform translate-y-2 group-hover:translate-y-0 group-hover:opacity-100 ${isActive ? '!opacity-100 !translate-y-0' : ''}">
            ${j.title}
            <div class="absolute w-2 h-2 bg-gray-800/90 rotate-45 -bottom-1 left-1/2 -translate-x-1/2"></div>
          </div>
          <!-- 核心圓點 -->
          <div class="w-5 h-5 md:w-6 md:h-6 rounded-full border-[2.5px] md:border-[3px] border-white shadow-md bg-gradient-to-br ${j.theme.gradient} flex items-center justify-center ${isActive ? 'animate-bounce shadow-xl ring-[3px] md:ring-4 ring-white/60' : ''}"></div>
        </div>
      `;

      return L.divIcon({
        className: 'custom-div-icon',
        html: htmlContent,
        iconSize: [24, 24],
        iconAnchor: [12, 12] // 確保錨點在圖示正中心
      });
    }

    // 獲取響應式的縮放等級
    function getResponsiveZoom(type) {
      const isMobile = window.innerWidth < 768;
      if (type === 'world') {
        // 啟用小數點縮放，讓畫面可以更完美的塞下全世界
        return isMobile ? 0.8 : 1.5; 
      }
      if (type === 'focus') {
        return isMobile ? 4 : 5; // 手機版縮放稍微退後一點，避免文字/畫面太擁擠
      }
      return 1.5;
    }

    // 初始化地圖
    function initMap() {
      const initialZoom = getResponsiveZoom('world');
      
      // 建立地圖實例
      map = L.map('map', {
        center: [20, 15], // 將中心經度偏移至15，讓美西與澳洲完美對稱入鏡
        zoom: initialZoom,
        zoomControl: false, // 我們自訂了縮放按鈕
        minZoom: 0, // 將最小縮放下調至 0，支援任意縮放
        zoomSnap: 0.1, // 啟用小數點縮放，滑順且精準
        maxBounds: [[-90, -180], [90, 180]], // 限制拖曳範圍在世界地圖內
        maxBoundsViscosity: 1.0
      });

      // 載入高質感、乾淨的底圖 (CartoDB Voyager)
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
      }).addTo(map);

      // 繪製所有地標
      JOURNEYS.forEach(j => {
        const marker = L.marker(j.coords, {
          icon: createCustomIcon(j, activeJourney.id === j.id)
        }).addTo(map);
        
        // 點擊地標時觸發
        marker.on('click', () => {
          setActive(j.id, false);
        });

        // 儲存參考以便後續更新狀態
        markers.push({ id: j.id, marker: marker, data: j });
      });

      // 綁定自訂縮放按鈕
      document.getElementById('zoom-in').addEventListener('click', () => map.zoomIn());
      document.getElementById('zoom-out').addEventListener('click', () => map.zoomOut());
      document.getElementById('zoom-reset').addEventListener('click', () => {
        map.flyTo([20, 15], getResponsiveZoom('world'), { duration: 1.5 });
      });

      // 初始將畫面設定為觀看全世界 (Zoom-out)
      map.setView([20, 15], initialZoom);
    }

    // 切換行程邏輯
    function setActive(id, shouldFly = true) {
      activeJourney = JOURNEYS.find(j => j.id === id);
      
      // 更新所有地標的視覺狀態 (反白/彈跳)
      markers.forEach(m => {
        const isActive = m.id === activeJourney.id;
        m.marker.setIcon(createCustomIcon(m.data, isActive));
        if (isActive) {
          m.marker.setZIndexOffset(1000); // 確保選中的在最上層
        } else {
          m.marker.setZIndexOffset(0);
        }
      });

      // 地圖使用超炫的飛行動畫前往該點，並自動抓取對應裝置的縮放等級
      map.flyTo(activeJourney.coords, getResponsiveZoom('focus'), {
        duration: 1.5,
        easeLinearity: 0.25
      });
      
      // 如果是從下方清單點擊，額外加入捲動回地圖區域的效果
      if (shouldFly) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      // 重新渲染右側與底部 UI
      renderUI();
    }

    // 渲染 UI (不包含地圖)
    function renderUI() {
      // 繪製右側簡報面板
      const active = activeJourney;
      document.getElementById('briefing-panel').innerHTML = `
        <div class="flex items-start gap-4 md:gap-5 mb-5 md:mb-6 relative z-10">
          <div class="p-3 md:p-4 rounded-xl md:rounded-[1.5rem] bg-gradient-to-br ${active.theme.gradient} text-white shadow-lg shrink-0">
            <i data-lucide="${active.icon}" class="w-6 h-6 md:w-8 md:h-8"></i>
          </div>
          <div>
            <h3 class="text-[10px] md:text-xs font-extrabold ${active.theme.text} tracking-widest mb-0.5 md:mb-1">${active.loc}</h3>
            <h2 class="text-xl md:text-2xl font-bold text-gray-800 leading-tight">${active.title}</h2>
          </div>
        </div>
        <p class="text-sm md:text-base text-gray-600 mb-6 md:mb-8 flex-grow font-medium leading-relaxed">${active.desc}</p>
        <div class="grid grid-cols-2 gap-3 md:gap-4 mb-6 md:mb-8">
          <div class="bg-gray-50 rounded-xl md:rounded-2xl p-3 md:p-4 border border-gray-100">
            <span class="block text-[10px] text-gray-400 tracking-wider mb-0.5 md:mb-1">日期長度</span>
            <span class="font-bold text-sm md:text-base text-gray-700">${active.stats.days}</span>
          </div>
          <div class="bg-gray-50 rounded-xl md:rounded-2xl p-3 md:p-4 border border-gray-100">
            <span class="block text-[10px] text-gray-400 tracking-wider mb-0.5 md:mb-1">旅程類型</span>
            <span class="font-bold text-sm md:text-base text-gray-700">${active.stats.type}</span>
          </div>
        </div>
        <a href="${active.url}" target="_blank" class="w-full text-center py-3.5 md:py-4 rounded-xl md:rounded-2xl text-sm md:text-base font-bold text-white bg-gradient-to-r ${active.theme.gradient} hover:shadow-lg hover:-translate-y-1 transition-all shadow-md">
          出發去看看 ✨
        </a>
      `;

      // 繪製底部卡片列表
      const archivesHtml = JOURNEYS.map(j => `
        <button onclick="setActive(${j.id}, true)" class="text-left p-5 md:p-6 rounded-[1.5rem] md:rounded-[2rem] bg-white border-2 transition-all group ${activeJourney.id === j.id ? 'border-sky-300 shadow-md ring-[3px] ring-sky-50' : 'border-gray-100 hover:border-gray-200 hover:-translate-y-1 md:hover:-translate-y-2 hover:shadow-md'}">
          <div class="flex items-center gap-2 md:gap-3 mb-2 md:mb-3">
             <div class="p-1.5 md:p-2 rounded-lg md:rounded-xl bg-gradient-to-br ${j.theme.gradient} text-white shadow-sm group-hover:scale-110 transition-transform">
               <i data-lucide="${j.icon}" class="w-3.5 h-3.5 md:w-4 md:h-4"></i>
             </div>
             <span class="text-[9px] md:text-[10px] font-bold text-gray-400 tracking-wider">${j.loc}</span>
          </div>
          <h3 class="text-lg md:text-xl font-bold text-gray-800 mb-0.5 md:mb-1">${j.title}</h3>
          <p class="text-xs md:text-sm text-gray-500 line-clamp-1">${j.subtitle}</p>
        </button>
      `).join('');
      document.getElementById('archives-container').innerHTML = archivesHtml;
      
      // 重新生成 Lucide Icons
      lucide.createIcons();
    }

    // 當網頁載入完成後啟動
    window.onload = () => {
      renderUI();
      initMap();
      
      // 監聽視窗大小改變，以處理跨裝置的體驗調整
      window.addEventListener('resize', () => {
        if (map && activeJourney) {
          // 只在非互動狀態時重新對齊中心點，可以根據需求開啟
          // map.panTo(activeJourney.coords);
        }
      });
    };
  </script>
</body>
</html>
